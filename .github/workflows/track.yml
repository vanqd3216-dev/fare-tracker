name: Fare tracker

on:
  schedule:
    - cron: "0 * * * *"     # hourly, on the hour (UTC; GitHub may delay under load)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # allows committing the updated CSV back to the repo

concurrency:
  group: fare-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python track.py

      - name: Commit updated price log
        run: |
          git config user.name "fare-tracker-bot"
          git config user.email "actions@github.com"
          git add fares_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Log fares $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
